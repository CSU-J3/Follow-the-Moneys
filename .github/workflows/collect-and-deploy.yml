name: Collect and deploy

on:
  schedule:
    # Every 6 hours at :00 UTC (00, 06, 12, 18). Matches "auto-collected
    # 4x daily" copy on the public site.
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

# Queue overlapping runs (a manual trigger landing during a cron run, etc.)
# instead of cancelling — every collection slot is independently meaningful.
concurrency:
  group: collect-and-deploy
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collectors
        run: python -m collectors.run_all

      - name: Commit data update
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- data/ docs/data.json; then
            echo "No data changes; nothing to commit."
            exit 0
          fi

          git add data/ docs/data.json
          # [skip ci] is belt-and-suspenders: GITHUB_TOKEN pushes already
          # don't trigger workflows, but the marker also signals intent to
          # any human reading the log.
          git commit -m "auto: collector run $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
          git push
